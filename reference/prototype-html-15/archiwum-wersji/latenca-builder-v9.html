<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Latenca — Build your wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400..600&family=Inter:wght@400..700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F3ED; --panel:#FBF9F5; --panel2:#F1EDE4;
    --ink:#1A1917; --muted:#6E695F; --faint:#8C8578; --line:#E7E2D8;
    --accent:#7C6CF0; --accent-soft:#ECE6FA; --accent-ink:#5F4DE0;
    --on-dark:#fff;
    --r-tile:2px; --r-sm:4px; --r-ui:6px; --r-full:999px; --r-lg:14px; --r-xl:20px;
    --fs-2xs:11px; --fs-xs:12px; --fs-sm:13px; --fs-base:14px; --fs-md:16px; --fs-lg:20px; --fs-xl:24px; --fs-2xl:32px;
    --w-normal:400; --w-medium:500; --w-semibold:600;
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px;
    --btn-sm:36px; --btn-md:40px; --btn-lg:48px;
    --dur-fast:.15s; --dur-base:.25s; --dur-slow:.45s; --ease:cubic-bezier(.4,0,.2,1);
    --focus-ring:2px solid var(--accent);
    --serif:'Lora',Georgia,serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* floating-app elevation */
    --float-sm:0 2px 8px rgba(30,22,12,.10), 0 1px 2px rgba(30,22,12,.06);
    --float-md:0 8px 24px -6px rgba(30,22,12,.16), 0 2px 6px rgba(30,22,12,.08);
    --float-lg:0 20px 50px -14px rgba(30,22,12,.26), 0 4px 12px rgba(30,22,12,.08);
    --frame-shadow:0 1px 2px rgba(30,22,12,.30), 0 4px 6px -2px rgba(30,22,12,.22), 0 22px 34px -14px rgba(30,22,12,.40);
    --frame-shadow-sel:0 1px 2px rgba(30,22,12,.30), 0 6px 10px -2px rgba(30,22,12,.26), 0 30px 46px -14px rgba(40,30,16,.48);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  html{overflow-x:clip}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:var(--fs-base);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;color:inherit}
  .defs{position:absolute;width:0;height:0;overflow:hidden}

  /* ── App shell / infinite canvas ── */
  .app{display:flex;height:100dvh;min-height:100vh;overflow:hidden}
  .work{position:relative;flex:1;display:grid;place-items:center;min-width:0;
    background:radial-gradient(130% 90% at 50% -10%, #f4f0e8 0%, #ece6da 55%, #e4ddce 100%)}
  /* faint canvas dot-grid */
  .work::before{content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(120,100,70,.09) 1.1px, transparent 1.1px);background-size:22px 22px}

  /* ── Left tool/step rail (desktop) ── */
  .rail{display:none;flex-direction:column;align-items:center;gap:var(--sp-2);width:88px;flex:none;
    padding:var(--sp-4) 0;background:rgba(251,249,245,.72);backdrop-filter:blur(10px);border-right:1px solid var(--line);z-index:6}
  .rlogo{display:grid;place-items:center;height:40px;margin-bottom:var(--sp-2);color:var(--ink);font-family:var(--serif);font-size:23px;font-weight:600}
  .rtool{width:64px;padding:9px 0 7px;border:none;background:none;border-radius:var(--r-ui);display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--muted);transition:background var(--dur-fast) var(--ease),color var(--dur-fast) var(--ease)}
  .rtool .ic{width:34px;height:34px;display:grid;place-items:center}
  .rtool svg{width:21px;height:21px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .rtool small{font-size:var(--fs-2xs);font-weight:var(--w-medium);letter-spacing:.01em}
  .rtool:hover{color:var(--ink);background:var(--panel2)}
  .rtool.on{color:var(--accent-ink);background:var(--accent-soft)}
  .rtool.on small{color:var(--accent-ink);font-weight:var(--w-semibold)}
  .rtool .num{position:absolute;transform:translate(14px,-13px);font-size:9px;font-weight:var(--w-semibold);color:var(--faint)}
  .rspring{flex:1}

  /* ── Floating top bar ── */
  .topbar{position:absolute;top:var(--sp-4);left:0;right:0;display:flex;align-items:center;gap:var(--sp-2);padding:0 var(--sp-4);z-index:5;pointer-events:none}
  .topbar>*{pointer-events:auto}
  .fbtn{width:var(--btn-md);height:var(--btn-md);border-radius:var(--r-ui);border:1px solid var(--line);background:var(--panel);box-shadow:var(--float-sm);display:grid;place-items:center;flex:none}
  .fbtn svg{width:19px;height:19px;stroke:var(--ink);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .etitle{font-family:var(--serif);font-weight:var(--w-medium);font-size:var(--fs-md);color:var(--ink);white-space:nowrap}
  .drop{flex:none;display:inline-flex;align-items:center;gap:var(--sp-2);height:var(--btn-md);padding:0 13px;border:1px solid var(--line);background:var(--panel);border-radius:var(--r-ui);font-size:var(--fs-sm);font-weight:var(--w-medium);color:var(--muted);white-space:nowrap;box-shadow:var(--float-sm)}
  .drop:hover{border-color:var(--accent);color:var(--accent-ink)}
  .drop b{color:var(--ink);font-weight:var(--w-semibold)}
  .drop .lead{width:15px;height:15px;stroke:var(--muted);stroke-width:1.8;fill:none}
  .drop .cv{width:13px;height:13px;stroke:var(--faint);stroke-width:2;fill:none}
  .tspring{flex:1}
  .cartpill{flex:none;display:inline-flex;align-items:center;gap:var(--sp-2);height:var(--btn-md);padding:0 var(--sp-4);border-radius:var(--r-ui);background:var(--panel);color:var(--ink);font-weight:var(--w-semibold);font-size:var(--fs-sm);border:1px solid var(--line);white-space:nowrap;box-shadow:var(--float-sm)}
  .cartpill svg{width:16px;height:16px;stroke:var(--ink);stroke-width:1.9;fill:none}

  /* mobile step progress pill */
  .mstep{display:none}

  /* ── Canvas stage (floating room) ── */
  .stage{width:100%;max-width:640px;position:relative}
  .ruler{position:absolute;bottom:11px;right:11px;z-index:2;display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-xs);color:var(--muted);white-space:nowrap;background:rgba(251,249,245,.82);backdrop-filter:blur(3px);border-radius:var(--r-ui);padding:5px 11px;box-shadow:var(--float-sm)}
  .ruler svg{width:13px;height:13px;stroke:var(--faint);stroke-width:1.8;fill:none}
  .ruler b{color:var(--ink);font-weight:var(--w-semibold)}

  .room{position:relative;width:100%;aspect-ratio:240/168;border-radius:var(--r-ui);overflow:hidden;
    box-shadow:var(--float-lg);background:linear-gradient(178deg,#efe9df 0%,#e9e2d5 62%,#e4dccd 78%)}
  .room::before{content:"";position:absolute;inset:0;background:radial-gradient(80% 70% at 22% 6%, rgba(255,252,245,.85), rgba(255,252,245,0) 60%);pointer-events:none}
  .room::after{content:"";position:absolute;inset:0;background:radial-gradient(90% 80% at 92% 100%, rgba(60,46,28,.10), rgba(60,46,28,0) 55%);pointer-events:none}
  .floor{position:absolute;left:0;right:0;bottom:0;height:15%;background:linear-gradient(180deg,#cbb493 0%,#c0a684 40%,#b89c76 100%)}
  .floor::before{content:"";position:absolute;inset:0;opacity:.35;background:repeating-linear-gradient(90deg, rgba(120,92,58,0) 0 46px, rgba(120,92,58,.18) 46px 47px)}
  .skirt{position:absolute;left:0;right:0;bottom:15%;height:2.4%;background:linear-gradient(180deg,#f2ece1,#e4dccd);border-top:1px solid rgba(255,255,255,.5);box-shadow:0 2px 4px rgba(30,22,12,.10)}
  .console{position:absolute;bottom:14.4%;left:50%;transform:translateX(-50%);width:52%;height:8%}
  .console .top{position:absolute;top:0;left:0;right:0;height:26%;border-radius:3px;background:linear-gradient(180deg,#d7c4a4,#c3ab86);box-shadow:0 6px 14px -4px rgba(30,22,12,.28)}
  .console .body{position:absolute;top:26%;left:6%;right:6%;bottom:0;background:linear-gradient(180deg,#cdb994,#bda175);border-radius:0 0 3px 3px}
  .console .body::before,.console .body::after{content:"";position:absolute;top:18%;bottom:18%;width:1px;background:rgba(90,66,38,.18)}
  .console .body::before{left:33%} .console .body::after{left:66%}

  /* framed art */
  .tile{position:absolute;transition:box-shadow var(--dur-base) var(--ease),transform var(--dur-base) var(--ease)}
  .frame{position:relative;width:100%;height:100%;padding:2.6%;border-radius:var(--r-tile);box-shadow:var(--frame-shadow)}
  .frame.black{background:linear-gradient(135deg,#2b2825 0%,#141210 60%,#000 100%)}
  .frame.white{background:linear-gradient(135deg,#ffffff,#ece6db);box-shadow:var(--frame-shadow),inset 0 0 0 1px rgba(20,16,10,.06)}
  .frame.oak{background:linear-gradient(135deg,#dcb884,#c39a5f 70%,#b48a4d);
    background-image:repeating-linear-gradient(90deg,rgba(120,86,40,0) 0 5px,rgba(120,86,40,.10) 5px 6px),linear-gradient(135deg,#dcb884,#c39a5f 70%,#b48a4d)}
  .frame.walnut{background:linear-gradient(135deg,#71503a,#4c3020 70%,#3c2517);
    background-image:repeating-linear-gradient(90deg,rgba(20,10,4,0) 0 5px,rgba(20,10,4,.16) 5px 6px),linear-gradient(135deg,#71503a,#4c3020 70%,#3c2517)}
  .mat{position:relative;width:100%;height:100%;padding:7%;background:linear-gradient(160deg,#f8f5ef,#efeadf);box-shadow:inset 0 1px 2px rgba(255,255,255,.7)}
  .artbox{position:relative;width:100%;height:100%;overflow:hidden;box-shadow:0 0 0 1px rgba(20,16,10,.10), inset 0 2px 5px rgba(20,16,10,.16)}
  .artbox svg,.artbox img{display:block;width:100%;height:100%;object-fit:cover}
  .frame .glass{position:absolute;inset:2.6%;pointer-events:none;border-radius:1px;background:linear-gradient(125deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 68%, rgba(255,255,255,.06) 100%)}
  .tile.sel{z-index:3}
  .tile.sel .frame{box-shadow:var(--frame-shadow-sel)}
  .tile.sel::after{content:"";position:absolute;inset:-7px;border:var(--focus-ring);border-radius:6px;pointer-events:none}
  .tile .pin{position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:var(--r-full);background:#b6ab97;box-shadow:0 1px 2px rgba(0,0,0,.3)}

  /* ── Floating zoom control ── */
  .zoom{position:absolute;left:var(--sp-4);bottom:var(--sp-4);display:inline-flex;align-items:center;gap:2px;padding:4px;border-radius:var(--r-ui);border:1px solid var(--line);background:var(--panel);box-shadow:var(--float-sm);z-index:5}
  .zoom button{width:30px;height:30px;border:none;background:none;border-radius:var(--r-sm);display:grid;place-items:center;color:var(--muted)}
  .zoom button:hover{background:var(--panel2);color:var(--ink)}
  .zoom svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round}
  .zoom .lvl{font-size:var(--fs-xs);font-weight:var(--w-medium);color:var(--muted);min-width:40px;text-align:center}

  /* ── Floating edit panel (desktop) / bottom sheet (mobile) ── */
  .panel{background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
  .scroll{flex:1;min-height:0;overflow-y:auto}
  .grab{width:36px;height:4px;border-radius:var(--r-full);background:var(--line);margin:8px auto 2px;flex:none}
  .phead{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-4) var(--sp-4) var(--sp-2)}
  .phead h3{font-family:var(--serif);font-weight:var(--w-medium);font-size:var(--fs-md);margin:0}
  .phead .close{margin-left:auto;width:32px;height:32px;border-radius:var(--r-full);border:none;background:var(--panel2);display:grid;place-items:center}
  .phead .close svg{width:16px;height:16px;stroke:var(--ink);stroke-width:1.9;fill:none;stroke-linecap:round}
  .pbody{padding:0 var(--sp-4) var(--sp-4)}

  .lbl{font-size:var(--fs-2xs);font-weight:var(--w-semibold);letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:var(--sp-4) 0 var(--sp-2)}
  .row{display:flex;gap:var(--sp-2);overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .row::-webkit-scrollbar{display:none}
  .thumb{width:62px;height:62px;flex:none;padding:5px;border-radius:var(--r-sm);background:linear-gradient(135deg,#2b2825,#141210);box-shadow:0 4px 10px -3px rgba(30,22,12,.4);border:2px solid transparent;cursor:pointer}
  .thumb .tmat{width:100%;height:100%;padding:5%;background:#f7f4ee}
  .thumb .tart{width:100%;height:100%;overflow:hidden}
  .thumb .tart svg,.thumb .tart img{display:block;width:100%;height:100%;object-fit:cover}
  .thumb.on{border-color:var(--accent);box-shadow:0 6px 14px -3px rgba(124,108,240,.5)}
  /* option chip — same primitive as the store's filter .cbtn */
  .cbtn{flex:none;display:inline-flex;align-items:center;gap:7px;height:var(--btn-sm);padding:0 var(--sp-3);border:1px solid var(--line);border-radius:var(--r-ui);background:var(--panel);font-size:var(--fs-xs);color:var(--muted);white-space:nowrap}
  .cbtn:hover{color:var(--ink)}
  .cbtn.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-ink);font-weight:var(--w-semibold)}
  .cbtn .fsw{width:14px;height:14px;border-radius:3px;flex:none;box-shadow:inset 0 0 0 1px rgba(20,16,10,.12)}
  .cbtn .szp{color:var(--muted)} .cbtn.on .szp{color:var(--accent-ink)}
  .acts{display:flex;gap:var(--sp-2);margin-top:var(--sp-4)}
  /* secondary button — same primitive as the store's .sell */
  .ghost{flex:1;height:var(--btn-md);border-radius:var(--r-ui);border:1px solid var(--line);background:var(--panel);color:var(--ink);font-weight:var(--w-semibold);font-size:var(--fs-sm);display:inline-flex;align-items:center;justify-content:center;gap:var(--sp-2)}
  .ghost:hover{border-color:var(--accent);color:var(--accent-ink)}
  .ghost svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .fileopt{display:flex;align-items:center;gap:var(--sp-2);margin-top:var(--sp-3);font-size:var(--fs-sm);color:var(--muted)}
  .fileopt .tgl{width:34px;height:20px;border-radius:var(--r-full);background:var(--accent);position:relative;flex:none}
  .fileopt .tgl::after{content:"";position:absolute;width:16px;height:16px;border-radius:var(--r-full);background:#fff;top:2px;right:2px}
  .pcta{flex:none;display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-top:1px solid var(--line);background:var(--panel)}
  .pcta .tot{display:flex;flex-direction:column;line-height:1.15}
  .pcta .tot small{font-size:var(--fs-xs);color:var(--muted)} .pcta .tot b{font-size:var(--fs-md);font-weight:var(--w-semibold)}
  /* primary button — same primitive as the store's .addcart (solid ink) */
  .btn-lg{margin-left:auto;height:var(--btn-lg);padding:0 var(--sp-5);border-radius:var(--r-ui);background:var(--ink);color:var(--bg);border:none;font-weight:var(--w-semibold);font-size:var(--fs-base);transition:filter var(--dur-fast)}
  .btn-lg:hover{filter:brightness(1.14)}

  /* ── Mobile bottom tab-steps ── */
  .mtabs{display:none}

  /* ═══ MOBILE (default) ═══ */
  @media(max-width:899px){
    .work{padding:64px var(--sp-3) 0}
    .work{place-items:start center}
    .stage{margin-top:var(--sp-2)}
    .topbar{top:var(--sp-3);padding:0 var(--sp-3)}
    .etitle{display:none} .dwall{display:none}
    .zoom{display:none}
    /* mobile step pill under top bar */
    .mstep{display:flex;align-items:center;gap:var(--sp-3);position:absolute;top:60px;left:var(--sp-3);right:var(--sp-3);z-index:4;
      padding:8px var(--sp-3);border-radius:var(--r-ui);background:var(--panel);border:1px solid var(--line);box-shadow:var(--float-sm)}
    .mstep .lab{font-size:var(--fs-sm);font-weight:var(--w-semibold);white-space:nowrap}
    .mstep .lab span{color:var(--faint);font-weight:var(--w-normal)}
    .mstep .segs{display:flex;gap:5px;flex:1}
    .mstep .segs i{height:4px;flex:1;border-radius:var(--r-full);background:var(--line)}
    .mstep .segs i.done{background:var(--accent-soft)} .mstep .segs i.on{background:var(--accent)}
    .work{padding-top:104px}
    /* floating bottom sheet */
    .panel{position:fixed;left:8px;right:8px;bottom:8px;max-height:52dvh;border-radius:12px;box-shadow:var(--float-lg);z-index:20}
    .phead{padding-top:var(--sp-2)}
  }

  /* ═══ DESKTOP ═══ */
  @media(min-width:900px){
    .rail{display:flex}
    .grab{display:none}
    .work{padding:84px 372px 84px 40px}
    .panel{position:absolute;top:80px;right:24px;bottom:24px;width:336px;border-radius:12px;box-shadow:var(--float-md)}
    .stage{max-width:min(640px, 100%)}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<div class="app">

  <!-- Left tool/step rail (desktop) -->
  <nav class="rail">
    <div class="rlogo">L</div>
