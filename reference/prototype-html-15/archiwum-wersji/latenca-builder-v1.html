<!doctype html>
<html lang="pl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Latenca — Builder ściany</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400..600&family=Inter:wght@400..700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F3ED; --panel:#FBF9F5; --panel2:#F1EDE4;
    --ink:#1A1917; --muted:#6E695F; --faint:#8C8578; --line:#E7E2D8;
    --accent:#7C6CF0; --accent-soft:#ECE6FA; --accent-ink:#5F4DE0;
    --media:#E7E0D3; --on-dark:#fff;
    --r-tile:2px; --r-sm:4px; --r-ui:6px; --r-full:999px;
    --shadow-1:0 6px 16px rgba(20,16,10,.20);
    --shadow-2:0 12px 28px rgba(20,16,10,.30);
    --shadow-bar:0 -8px 24px rgba(15,12,20,.08);
    --shadow-drawer:-14px 0 40px rgba(15,12,20,.10);
    --fs-2xs:11px; --fs-xs:12px; --fs-sm:13px; --fs-base:14px; --fs-md:16px; --fs-lg:20px; --fs-xl:24px; --fs-2xl:32px;
    --w-normal:400; --w-medium:500; --w-semibold:600;
    --lh-tight:1.2; --lh-base:1.5;
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px;
    --btn-sm:36px; --btn-md:40px; --btn-lg:48px;
    --dur-fast:.15s; --dur-base:.25s; --ease:cubic-bezier(.4,0,.2,1);
    --focus-ring:2px solid var(--accent);
    --serif:'Lora',Georgia,serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* calm art placeholders */
    --artA:linear-gradient(135deg,#cdbfe8,#9a86d8);
    --artB:linear-gradient(160deg,#cfe0d2,#94b79e);
    --artC:linear-gradient(150deg,#ecd9c8,#cf9f86);
    --artD:linear-gradient(145deg,#dfe3ea,#a9b0bf);
    --artE:linear-gradient(155deg,#e8dcc0,#c8a86a);
    --artF:linear-gradient(140deg,#e6c9c2,#c07d72);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  html{overflow-x:clip}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:var(--fs-base);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  .app{display:flex;flex-direction:column;height:100dvh;min-height:100vh}

  /* ── Top bar ── */
  .top{display:flex;align-items:center;gap:var(--sp-3);height:56px;padding:0 var(--sp-4);border-bottom:1px solid var(--line);background:var(--panel);flex:none}
  .icon{width:var(--btn-md);height:var(--btn-md);border-radius:var(--r-ui);border:1px solid var(--line);background:var(--panel);display:grid;place-items:center;flex:none}
  .icon svg{width:20px;height:20px;stroke:var(--ink);stroke-width:1.75;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .brand{font-family:var(--serif);font-weight:var(--w-medium);font-size:var(--fs-md);letter-spacing:.02em;flex:1;text-align:center}
  .cart{display:inline-flex;align-items:center;gap:var(--sp-2);height:var(--btn-md);padding:0 var(--sp-3);border-radius:var(--r-full);background:var(--accent);color:#fff;font-weight:var(--w-semibold);font-size:var(--fs-sm);border:none;flex:none}
  .cart svg{width:17px;height:17px;stroke:#fff;stroke-width:1.9;fill:none}

  /* ── Context / step strip ── */
  .strip{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--line);background:var(--panel);flex:none;overflow-x:auto;scrollbar-width:none}
  .strip::-webkit-scrollbar{display:none}
  .chip{display:inline-flex;align-items:center;gap:6px;height:var(--btn-sm);padding:0 var(--sp-3);border-radius:var(--r-full);border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:var(--fs-sm);font-weight:var(--w-medium);white-space:nowrap;flex:none}
  .chip svg{width:14px;height:14px;stroke:var(--muted);stroke-width:1.9;fill:none}
  .chip b{font-weight:var(--w-semibold)}
  .steps{display:none;align-items:center;gap:var(--sp-1);margin-left:auto;flex:none}
  .step{display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-sm);color:var(--faint);white-space:nowrap}
  .step .n{width:22px;height:22px;border-radius:var(--r-full);display:grid;place-items:center;font-size:var(--fs-xs);font-weight:var(--w-semibold);background:var(--panel2);color:var(--muted)}
  .step.on{color:var(--ink);font-weight:var(--w-semibold)} .step.on .n{background:var(--accent);color:#fff}
  .step.done .n{background:var(--accent-soft);color:var(--accent-ink)}
  .step .sep{width:16px;height:1px;background:var(--line)}
  .mobstep{display:inline-flex;align-items:center;gap:6px;margin-left:auto;font-size:var(--fs-sm);color:var(--muted);font-weight:var(--w-medium)}
  .dots{display:inline-flex;gap:4px} .dots i{width:6px;height:6px;border-radius:var(--r-full);background:var(--line)} .dots i.on{background:var(--accent);width:16px}

  /* ── Main layout ── */
  .main{flex:1;display:flex;flex-direction:column;min-height:0}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--sp-5);min-height:0;background:var(--bg)}
  .wallwrap{width:100%;max-width:560px;position:relative}
  .scalebadge{position:absolute;top:-10px;left:0;transform:translateY(-100%);display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-xs);color:var(--muted);white-space:nowrap}
  .scalebadge b{color:var(--ink);font-weight:var(--w-semibold)}
  .wall{position:relative;aspect-ratio:240/150;border-radius:var(--r-ui);
    background:linear-gradient(175deg,#f3efe7,#e8e2d6);
    box-shadow:inset 0 2px 20px rgba(20,16,10,.06),inset 0 0 0 1px rgba(20,16,10,.03);overflow:hidden}
  .baseline{position:absolute;left:0;right:0;bottom:16%;height:1px;background:rgba(20,16,10,.06)}
  .tile{position:absolute}
  .tile .frame{width:100%;height:100%;box-shadow:var(--shadow-1);border-radius:var(--r-tile)}
  .frame.black{border:5px solid #1a1917}
  .frame.white{border:5px solid #fbf9f5;outline:1px solid var(--line)}
  .frame.oak{border:6px solid #c8a26a}
  .frame.walnut{border:6px solid #6b4a34}
  .art{width:100%;height:100%;border-radius:1px}
  .a-A{background:var(--artA)} .a-B{background:var(--artB)} .a-C{background:var(--artC)}
  .a-D{background:var(--artD)} .a-E{background:var(--artE)} .a-F{background:var(--artF)}
  .tile.empty .frame{border:1.5px dashed #b9b1a1;background:rgba(255,255,255,.35);box-shadow:none;display:grid;place-items:center;place-content:center;gap:4px;text-align:center}
  .tile.empty .plus{width:26px;height:26px;border-radius:var(--r-full);background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-size:18px;line-height:1}
  .tile.empty small{font-size:10px;color:var(--muted)}
  .tile.sel{outline:var(--focus-ring);outline-offset:4px;border-radius:2px}
  .tag{position:absolute;top:6px;left:6px;font-size:10px;font-weight:var(--w-semibold);background:var(--glass,rgba(20,16,26,.72));color:#fff;padding:1px 6px;border-radius:var(--r-full)}

  /* ── Editor: bottom sheet (mobile) / side panel (desktop) ── */
  .cartbar{flex:none;display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-top:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow-bar)}
  .cartbar .tot{display:flex;flex-direction:column;line-height:1.15}
  .cartbar .tot small{font-size:var(--fs-xs);color:var(--muted)}
  .cartbar .tot b{font-size:var(--fs-md);font-weight:var(--w-semibold)}
  .btn-lg{margin-left:auto;height:var(--btn-lg);padding:0 var(--sp-5);border-radius:var(--r-ui);background:var(--accent);color:#fff;border:none;font-weight:var(--w-semibold);font-size:var(--fs-base)}

  .sheet{flex:none;background:var(--panel);border-top:1px solid var(--line);border-radius:16px 16px 0 0;box-shadow:0 -10px 30px rgba(15,12,20,.10);padding:var(--sp-3) var(--sp-4) 0;display:flex;flex-direction:column;max-height:52dvh;overflow:hidden}
  .sheet .scroll{flex:1;min-height:0;overflow-y:auto;padding-bottom:var(--sp-4)}
  .grab{width:36px;height:4px;border-radius:var(--r-full);background:var(--line);margin:2px auto var(--sp-3);flex:none}
  .shead{display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-3)}
  .shead h3{font-family:var(--serif);font-weight:var(--w-medium);font-size:var(--fs-md);margin:0}
  .shead .close{margin-left:auto;width:32px;height:32px;border-radius:var(--r-full);border:1px solid var(--line);background:var(--panel);display:grid;place-items:center}
  .shead .close svg{width:16px;height:16px;stroke:var(--ink);stroke-width:1.9;fill:none;stroke-linecap:round}

  .lbl{font-size:var(--fs-xs);font-weight:var(--w-semibold);letter-spacing:.03em;text-transform:uppercase;color:var(--faint);margin:var(--sp-3) 0 var(--sp-2)}
  .row{display:flex;gap:var(--sp-2);overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .row::-webkit-scrollbar{display:none}
  .thumb{width:64px;height:64px;border-radius:var(--r-sm);flex:none;box-shadow:var(--shadow-1);border:2px solid transparent}
  .thumb.on{border-color:var(--accent);box-shadow:var(--shadow-2)}
  .fchip{flex:none;display:inline-flex;align-items:center;gap:6px;height:var(--btn-sm);padding:0 var(--sp-3);border-radius:var(--r-full);border:1px solid var(--line);background:var(--panel);font-size:var(--fs-sm);font-weight:var(--w-medium);white-space:nowrap}
  .fchip .sw{width:14px;height:14px;border-radius:3px;flex:none}
  .fchip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
  .szchip{flex:none;height:var(--btn-sm);padding:0 var(--sp-3);border-radius:var(--r-full);border:1px solid var(--line);background:var(--panel);font-size:var(--fs-sm);font-weight:var(--w-medium);white-space:nowrap}
  .szchip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
  .szchip small{color:var(--muted);font-weight:var(--w-normal)}
  .acts{display:flex;gap:var(--sp-2);margin-top:var(--sp-4)}
  .ghost{flex:1;height:var(--btn-md);border-radius:var(--r-ui);border:1px solid var(--line);background:var(--panel);color:var(--ink);font-weight:var(--w-medium);font-size:var(--fs-sm);display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .ghost svg{width:16px;height:16px;stroke:var(--ink);stroke-width:1.8;fill:none}
  .fileopt{display:flex;align-items:center;gap:var(--sp-2);margin-top:var(--sp-3);font-size:var(--fs-sm);color:var(--muted)}
  .fileopt .tgl{width:34px;height:20px;border-radius:var(--r-full);background:var(--accent);position:relative;flex:none}
  .fileopt .tgl::after{content:"";position:absolute;width:16px;height:16px;border-radius:var(--r-full);background:#fff;top:2px;right:2px}

  /* ── Desktop ── */
  @media(min-width:900px){
    .mobstep{display:none} .steps{display:flex}
    .cartbar{display:none}
    .main{padding:0;flex-direction:row}
    .sheet{width:390px;flex:none;max-height:none;border-radius:0;border-top:none;border-left:1px solid var(--line);box-shadow:var(--shadow-drawer);
      display:flex;flex-direction:column;padding:var(--sp-5) var(--sp-5) 0}
    .grab{display:none}
    .sheet .scroll{flex:1;overflow-y:auto}
    .sheet .panelcta{margin:var(--sp-4) calc(var(--sp-5)*-1) 0;padding:var(--sp-4) var(--sp-5);border-top:1px solid var(--line);display:flex;align-items:center;gap:var(--sp-3)}
    .panelcta .tot{display:flex;flex-direction:column;line-height:1.15}
    .panelcta .tot small{font-size:var(--fs-xs);color:var(--muted)} .panelcta .tot b{font-size:var(--fs-md);font-weight:var(--w-semibold)}
    .panelcta .btn-lg{margin-left:auto}
    .stage{padding:var(--sp-8)}
  }
  @media(max-width:899px){ .sheet .panelcta{display:none} }
</style>
</head>
<body>
<div class="app">

  <div class="top">
    <button class="icon" aria-label="Wstecz"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="brand">Zbuduj swoją ścianę</div>
    <button class="cart"><svg viewBox="0 0 24 24"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg>486 zł</button>
  </div>

  <div class="strip">
    <button class="chip"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Układ: <b>Salon</b><svg viewBox="0 0 24 24" style="width:12px"><path d="M6 9l6 6 6-6"/></svg></button>
    <button class="chip"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 6v12M21 6v12M3 18h18"/></svg>Ściana: <b>240×150 cm</b><svg viewBox="0 0 24 24" style="width:12px"><path d="M6 9l6 6 6-6"/></svg></button>
    <!-- desktop full step rail -->
    <div class="steps">
      <span class="step done"><span class="n">1</span>Układ</span><span class="sep"></span>
      <span class="step done"><span class="n">2</span>Rozmiar</span><span class="sep"></span>
      <span class="step on"><span class="n">3</span>Grafiki</span><span class="sep"></span>
      <span class="step"><span class="n">4</span>Podgląd</span><span class="sep"></span>
      <span class="step"><span class="n">5</span>Koszyk</span>
    </div>
    <!-- mobile compact -->
    <span class="mobstep">Krok 3/5 · Grafiki <span class="dots"><i></i><i></i><i class="on"></i><i></i><i></i></span></span>
  </div>

  <div class="main">
    <div class="stage">
      <div class="wallwrap">
        <span class="scalebadge">Ściana <b>240 × 150 cm</b> · pokazane w skali</span>
        <div class="wall">
          <div class="baseline"></div>

          <div class="tile sel" style="left:7%;top:16%;width:19%;height:40%">
            <div class="frame black"><div class="art a-A"></div></div>
            <span class="tag">Kafelek 3</span>
          </div>
          <div class="tile" style="left:31%;top:11%;width:27%;height:31%">
            <div class="frame oak"><div class="art a-B"></div></div>
          </div>
          <div class="tile" style="left:63%;top:13%;width:18%;height:42%">
            <div class="frame white"><div class="art a-C"></div></div>
          </div>
          <div class="tile" style="left:10%;top:60%;width:23%;height:24%">
            <div class="frame walnut"><div class="art a-D"></div></div>
          </div>
          <div class="tile empty" style="left:37%;top:49%;width:19%;height:33%">
            <div class="frame"><span class="plus">+</span><small>Dodaj</small></div>
          </div>
          <div class="tile" style="left:60%;top:60%;width:25%;height:26%">
            <div class="frame black"><div class="art a-E"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Editor: bottom sheet on mobile, side panel on desktop -->
    <div class="sheet">
      <div class="grab"></div>
      <div class="shead">
        <h3>Kafelek 3 — wybierz grafikę</h3>
        <button class="close" aria-label="Gotowe"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      </div>
      <div class="scroll">
        <div class="lbl">Z kolekcji Latenca</div>
        <div class="row">
          <div class="thumb on a-A"></div><div class="thumb a-C"></div><div class="thumb a-B"></div>
          <div class="thumb a-F"></div><div class="thumb a-D"></div><div class="thumb a-E"></div><div class="thumb a-A" style="opacity:.5"></div>
        </div>

        <div class="lbl">Ramka</div>
        <div class="row">
          <button class="fchip on"><span class="sw" style="background:#1a1917"></span>Czarna</button>
          <button class="fchip"><span class="sw" style="background:#fbf9f5;outline:1px solid var(--line)"></span>Biała</button>
          <button class="fchip"><span class="sw" style="background:#c8a26a"></span>Dąb</button>
          <button class="fchip"><span class="sw" style="background:#6b4a34"></span>Orzech</button>
          <button class="fchip"><span class="sw" style="background:repeating-linear-gradient(45deg,#ddd,#ddd 3px,#fff 3px,#fff 6px)"></span>Bez ramki</button>
        </div>

        <div class="lbl">Rozmiar druku</div>
        <div class="row">
          <button class="szchip">30×40 <small>· 89 zł</small></button>
          <button class="szchip on">40×50 <small>· 129 zł</small></button>
          <button class="szchip">50×70 <small>· 189 zł</small></button>
          <button class="szchip">70×100 <small>· 279 zł</small></button>
        </div>

        <div class="acts">
          <button class="ghost"><svg viewBox="0 0 24 24"><path d="M7 16V4M7 4L3 8M7 4l4 4M17 8v12M17 20l4-4M17 20l-4-4"/></svg>Zamień miejsce</button>
          <button class="ghost"><svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>Usuń</button>
        </div>
        <div class="fileopt"><span class="tgl"></span>Dodaj też jako plik do pobrania (+39 zł)</div>
      </div>

      <div class="panelcta">
        <div class="tot"><small>Ściana · 5 grafik</small><b>486 zł</b></div>
        <button class="btn-lg">Dodaj ścianę do koszyka</button>
      </div>
    </div>
  </div>

  <!-- mobile sticky cart bar -->
  <div class="cartbar">
    <div class="tot"><small>Ściana · 5 grafik</small><b>486 zł</b></div>
    <button class="btn-lg">Dodaj ścianę</button>
  </div>

</div>
</body>
</html>
