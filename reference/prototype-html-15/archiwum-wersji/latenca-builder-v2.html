<!doctype html>
<html lang="pl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Latenca — Builder ściany</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400..600&family=Inter:wght@400..700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F3ED; --panel:#FBF9F5; --panel2:#F1EDE4;
    --ink:#1A1917; --muted:#6E695F; --faint:#8C8578; --line:#E7E2D8;
    --accent:#7C6CF0; --accent-soft:#ECE6FA; --accent-ink:#5F4DE0;
    --on-dark:#fff;
    --r-tile:2px; --r-sm:4px; --r-ui:6px; --r-full:999px;
    --fs-2xs:11px; --fs-xs:12px; --fs-sm:13px; --fs-base:14px; --fs-md:16px; --fs-lg:20px; --fs-xl:24px; --fs-2xl:32px;
    --w-normal:400; --w-medium:500; --w-semibold:600;
    --lh-tight:1.2; --lh-base:1.5;
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px;
    --btn-sm:36px; --btn-md:40px; --btn-lg:48px;
    --dur-fast:.15s; --dur-base:.25s; --dur-slow:.45s; --ease:cubic-bezier(.4,0,.2,1);
    --focus-ring:2px solid var(--accent);
    --serif:'Lora',Georgia,serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    --shadow-bar:0 -8px 24px rgba(15,12,20,.08);
    --shadow-drawer:-14px 0 40px rgba(15,12,20,.10);
    /* framed-art contact + ambient shadow (light from top) */
    --frame-shadow:0 1px 2px rgba(30,22,12,.30), 0 4px 6px -2px rgba(30,22,12,.22), 0 22px 34px -14px rgba(30,22,12,.40);
    --frame-shadow-sel:0 1px 2px rgba(30,22,12,.30), 0 6px 10px -2px rgba(30,22,12,.26), 0 30px 46px -14px rgba(40,30,16,.48);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  html{overflow-x:clip}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:var(--fs-base);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  .app{display:flex;flex-direction:column;height:100dvh;min-height:100vh}
  .defs{position:absolute;width:0;height:0;overflow:hidden}

  /* ── Top bar ── */
  .top{display:flex;align-items:center;gap:var(--sp-3);height:56px;padding:0 var(--sp-4);border-bottom:1px solid var(--line);background:var(--panel);flex:none;z-index:5}
  .icon{width:var(--btn-md);height:var(--btn-md);border-radius:var(--r-ui);border:1px solid var(--line);background:var(--panel);display:grid;place-items:center;flex:none}
  .icon svg{width:20px;height:20px;stroke:var(--ink);stroke-width:1.75;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .brand{font-family:var(--serif);font-weight:var(--w-medium);font-size:var(--fs-md);letter-spacing:.02em;flex:1;text-align:center}
  .cart{display:inline-flex;align-items:center;gap:var(--sp-2);height:var(--btn-md);padding:0 var(--sp-3);border-radius:var(--r-full);background:var(--accent);color:#fff;font-weight:var(--w-semibold);font-size:var(--fs-sm);border:none;flex:none}
  .cart svg{width:17px;height:17px;stroke:#fff;stroke-width:1.9;fill:none}

  /* ── Mobile step progress (full-width, no clipping) ── */
  .mprog{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-2) var(--sp-4);border-bottom:1px solid var(--line);background:var(--panel);flex:none}
  .mprog .lab{font-size:var(--fs-sm);font-weight:var(--w-semibold);color:var(--ink);white-space:nowrap}
  .mprog .lab span{color:var(--faint);font-weight:var(--w-normal)}
  .segs{display:flex;gap:5px;flex:1}
  .segs i{height:4px;flex:1;border-radius:var(--r-full);background:var(--line)}
  .segs i.done{background:var(--accent-soft)} .segs i.on{background:var(--accent)}

  /* ── Context / step strip ── */
  .strip{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--line);background:var(--panel);flex:none;overflow-x:auto;scrollbar-width:none}
  .strip::-webkit-scrollbar{display:none}
  .chip{display:inline-flex;align-items:center;gap:6px;height:var(--btn-sm);padding:0 var(--sp-3);border-radius:var(--r-full);border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:var(--fs-sm);font-weight:var(--w-medium);white-space:nowrap;flex:none}
  .chip svg{width:14px;height:14px;stroke:var(--muted);stroke-width:1.9;fill:none}
  .chip .cv{width:12px;height:12px;stroke:var(--faint);stroke-width:2}
  .chip b{font-weight:var(--w-semibold)}
  .steps{display:none;align-items:center;gap:var(--sp-1);margin-left:auto;flex:none}
  .step{display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-sm);color:var(--faint);white-space:nowrap}
  .step .n{width:22px;height:22px;border-radius:var(--r-full);display:grid;place-items:center;font-size:var(--fs-xs);font-weight:var(--w-semibold);background:var(--panel2);color:var(--muted)}
  .step.on{color:var(--ink);font-weight:var(--w-semibold)} .step.on .n{background:var(--accent);color:#fff}
  .step.done .n{background:var(--accent-soft);color:var(--accent-ink)}
  .step .sep{width:16px;height:1px;background:var(--line)}

  /* ── Main layout ── */
  .main{flex:1;display:flex;flex-direction:column;min-height:0}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--sp-5) var(--sp-5) var(--sp-4);min-height:0;
    background:radial-gradient(120% 90% at 30% 8%, #efeae0 0%, #e7e0d3 55%, #ddd4c4 100%)}
  .wallwrap{width:100%;max-width:600px;position:relative}
  .ruler{position:absolute;bottom:11px;right:11px;z-index:2;display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-xs);color:var(--muted);white-space:nowrap;background:rgba(251,249,245,.82);backdrop-filter:blur(3px);border:1px solid var(--line);border-radius:var(--r-full);padding:4px 11px;box-shadow:0 2px 8px rgba(30,22,12,.12)}
  .ruler svg{width:13px;height:13px;stroke:var(--faint);stroke-width:1.8;fill:none}
  .ruler b{color:var(--ink);font-weight:var(--w-semibold)}

  /* ── Room scene ── */
  .room{position:relative;width:100%;aspect-ratio:240/168;border-radius:var(--r-ui);overflow:hidden;
    box-shadow:0 30px 60px -24px rgba(30,22,12,.45), 0 2px 0 rgba(255,255,255,.4) inset;
    background:linear-gradient(178deg,#efe9df 0%,#e9e2d5 62%,#e4dccd 78%)}
  /* directional daylight from upper-left */
  .room::before{content:"";position:absolute;inset:0;background:radial-gradient(80% 70% at 22% 6%, rgba(255,252,245,.85), rgba(255,252,245,0) 60%);pointer-events:none}
  /* soft vignette lower-right */
  .room::after{content:"";position:absolute;inset:0;background:radial-gradient(90% 80% at 92% 100%, rgba(60,46,28,.10), rgba(60,46,28,0) 55%);pointer-events:none}
  .floor{position:absolute;left:0;right:0;bottom:0;height:15%;
    background:linear-gradient(180deg,#cbb493 0%,#c0a684 40%,#b89c76 100%)}
  .floor::before{content:"";position:absolute;inset:0;opacity:.35;
    background:repeating-linear-gradient(90deg, rgba(120,92,58,.0) 0 46px, rgba(120,92,58,.18) 46px 47px)}
  .skirt{position:absolute;left:0;right:0;bottom:15%;height:2.4%;background:linear-gradient(180deg,#f2ece1,#e4dccd);border-top:1px solid rgba(255,255,255,.5);box-shadow:0 2px 4px rgba(30,22,12,.10)}

  /* console + one plant — clean, low-contrast, art stays hero */
  .console{position:absolute;bottom:14.4%;left:50%;transform:translateX(-50%);width:52%;height:8%}
  .console .top{position:absolute;top:0;left:0;right:0;height:26%;border-radius:3px;background:linear-gradient(180deg,#d7c4a4,#c3ab86);box-shadow:0 6px 14px -4px rgba(30,22,12,.28)}
  .console .body{position:absolute;top:26%;left:6%;right:6%;bottom:0;background:linear-gradient(180deg,#cdb994,#bda175);border-radius:0 0 3px 3px}
  .console .body::before,.console .body::after{content:"";position:absolute;top:18%;bottom:18%;width:1px;background:rgba(90,66,38,.18)}
  .console .body::before{left:33%} .console .body::after{left:66%}
  /* single tidy plant on the console */
  .plant{position:absolute;bottom:22%;left:30%;width:9%;height:26%}
  .plant .pot{position:absolute;bottom:0;left:22%;width:56%;height:34%;background:linear-gradient(180deg,#ca9c78,#b07f57);border-radius:3px 3px 7px 7px}
  .plant .lf{position:absolute;bottom:30%;left:50%;width:52%;aspect-ratio:1/2.4;background:#94a583;border-radius:80% 0 80% 0;transform-origin:bottom center}
  .plant .lf.a{transform:translateX(-50%) rotate(-26deg)}
  .plant .lf.b{transform:translateX(-50%) rotate(0deg);background:#889977;aspect-ratio:1/2.9}
  .plant .lf.c{transform:translateX(-50%) rotate(26deg)}

  /* ── Framed art ── */
  .tile{position:absolute;transition:box-shadow var(--dur-base) var(--ease),transform var(--dur-base) var(--ease)}
  .frame{position:relative;width:100%;height:100%;padding:2.6%;border-radius:var(--r-tile);box-shadow:var(--frame-shadow)}
  .frame.black{background:linear-gradient(135deg,#2b2825 0%,#141210 60%,#000 100%)}
  .frame.white{background:linear-gradient(135deg,#ffffff,#ece6db);box-shadow:var(--frame-shadow),inset 0 0 0 1px rgba(20,16,10,.06)}
  .frame.oak{background:linear-gradient(135deg,#dcb884,#c39a5f 70%,#b48a4d);
    background-image:repeating-linear-gradient(90deg,rgba(120,86,40,.0) 0 5px,rgba(120,86,40,.10) 5px 6px),linear-gradient(135deg,#dcb884,#c39a5f 70%,#b48a4d)}
  .frame.walnut{background:linear-gradient(135deg,#71503a,#4c3020 70%,#3c2517);
    background-image:repeating-linear-gradient(90deg,rgba(20,10,4,.0) 0 5px,rgba(20,10,4,.16) 5px 6px),linear-gradient(135deg,#71503a,#4c3020 70%,#3c2517)}
  .mat{position:relative;width:100%;height:100%;padding:7%;background:linear-gradient(160deg,#f8f5ef,#efeadf);
    box-shadow:inset 0 1px 2px rgba(255,255,255,.7)}
  .artbox{position:relative;width:100%;height:100%;overflow:hidden;
    box-shadow:0 0 0 1px rgba(20,16,10,.10), inset 0 2px 5px rgba(20,16,10,.16)}
  .artbox svg{display:block;width:100%;height:100%}
  /* glass sheen */
  .frame .glass{position:absolute;inset:2.6%;pointer-events:none;border-radius:1px;
    background:linear-gradient(125deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 68%, rgba(255,255,255,.06) 100%)}
  .tile.sel{z-index:3}
  .tile.sel .frame{box-shadow:var(--frame-shadow-sel)}
  .tile.sel::after{content:"";position:absolute;inset:-7px;border:var(--focus-ring);border-radius:5px;pointer-events:none}
  .tile .pin{position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:var(--r-full);background:#b6ab97;box-shadow:0 1px 2px rgba(0,0,0,.3)}

  /* ── Editor: bottom sheet (mobile) / side panel (desktop) ── */
  .cartbar{flex:none;display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-top:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow-bar)}
  .cartbar .tot,.panelcta .tot{display:flex;flex-direction:column;line-height:1.15}
  .cartbar .tot small,.panelcta .tot small{font-size:var(--fs-xs);color:var(--muted)}
  .cartbar .tot b,.panelcta .tot b{font-size:var(--fs-md);font-weight:var(--w-semibold)}
  .btn-lg{margin-left:auto;height:var(--btn-lg);padding:0 var(--sp-5);border-radius:var(--r-ui);background:var(--accent);color:#fff;border:none;font-weight:var(--w-semibold);font-size:var(--fs-base)}

  .sheet{flex:none;background:var(--panel);border-top:1px solid var(--line);border-radius:16px 16px 0 0;box-shadow:0 -10px 30px rgba(15,12,20,.10);padding:var(--sp-3) var(--sp-4) 0;display:flex;flex-direction:column;max-height:50dvh;overflow:hidden}
  .sheet .scroll{flex:1;min-height:0;overflow-y:auto;padding-bottom:var(--sp-4)}
  .grab{width:36px;height:4px;border-radius:var(--r-full);background:var(--line);margin:2px auto var(--sp-3);flex:none}
  .shead{display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-2)}
  .shead h3{font-family:var(--serif);font-weight:var(--w-medium);font-size:var(--fs-md);margin:0}
  .shead .close{margin-left:auto;width:32px;height:32px;border-radius:var(--r-full);border:1px solid var(--line);background:var(--panel);display:grid;place-items:center}
  .shead .close svg{width:16px;height:16px;stroke:var(--ink);stroke-width:1.9;fill:none;stroke-linecap:round}

  .lbl{font-size:var(--fs-xs);font-weight:var(--w-semibold);letter-spacing:.03em;text-transform:uppercase;color:var(--faint);margin:var(--sp-4) 0 var(--sp-2)}
  .lbl:first-child{margin-top:var(--sp-2)}
  .row{display:flex;gap:var(--sp-2);overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .row::-webkit-scrollbar{display:none}
  /* thumbnails shown already framed */
  .thumb{width:62px;height:62px;flex:none;padding:5px;border-radius:var(--r-sm);background:linear-gradient(135deg,#2b2825,#141210);box-shadow:0 4px 10px -3px rgba(30,22,12,.4);border:2px solid transparent;cursor:pointer}
  .thumb .tmat{width:100%;height:100%;padding:5%;background:#f7f4ee}
  .thumb .tart{width:100%;height:100%;overflow:hidden}
  .thumb .tart svg{display:block;width:100%;height:100%}
  .thumb.on{border-color:var(--accent);box-shadow:0 6px 14px -3px rgba(124,108,240,.5)}
  .fchip{flex:none;display:inline-flex;align-items:center;gap:6px;height:var(--btn-sm);padding:0 var(--sp-3);border-radius:var(--r-full);border:1px solid var(--line);background:var(--panel);font-size:var(--fs-sm);font-weight:var(--w-medium);white-space:nowrap}
  .fchip .sw{width:15px;height:15px;border-radius:3px;flex:none;box-shadow:inset 0 0 0 1px rgba(20,16,10,.12)}
  .fchip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
  .szchip{flex:none;display:inline-flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:1px;min-height:var(--btn-md);padding:5px var(--sp-3);border-radius:var(--r-ui);border:1px solid var(--line);background:var(--panel);white-space:nowrap;line-height:1.1}
  .szchip .d{font-size:var(--fs-sm);font-weight:var(--w-semibold)}
  .szchip .p{font-size:var(--fs-xs);color:var(--muted)}
  .szchip.on{border-color:var(--accent);background:var(--accent-soft)} .szchip.on .p{color:var(--accent-ink)}
  .acts{display:flex;gap:var(--sp-2);margin-top:var(--sp-4)}
  .ghost{flex:1;height:var(--btn-md);border-radius:var(--r-ui);border:1px solid var(--line);background:var(--panel);color:var(--ink);font-weight:var(--w-medium);font-size:var(--fs-sm);display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .ghost svg{width:16px;height:16px;stroke:var(--ink);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .fileopt{display:flex;align-items:center;gap:var(--sp-2);margin-top:var(--sp-3);font-size:var(--fs-sm);color:var(--muted)}
  .fileopt .tgl{width:34px;height:20px;border-radius:var(--r-full);background:var(--accent);position:relative;flex:none}
  .fileopt .tgl::after{content:"";position:absolute;width:16px;height:16px;border-radius:var(--r-full);background:#fff;top:2px;right:2px}

  /* ── Desktop ── */
  @media(min-width:900px){
    .mprog{display:none} .steps{display:flex}
    .cartbar{display:none}
    .main{padding:0;flex-direction:row}
    .stage{padding:var(--sp-8)}
    .sheet{width:400px;flex:none;max-height:none;border-radius:0;border-top:none;border-left:1px solid var(--line);box-shadow:var(--shadow-drawer);
      display:flex;flex-direction:column;padding:var(--sp-5) var(--sp-5) 0}
    .grab{display:none}
    .sheet .scroll{flex:1;overflow-y:auto}
    .sheet .panelcta{margin:var(--sp-4) calc(var(--sp-5)*-1) 0;padding:var(--sp-4) var(--sp-5);border-top:1px solid var(--line);display:flex;align-items:center;gap:var(--sp-3)}
    .panelcta .btn-lg{margin-left:auto}
  }
  @media(max-width:899px){ .sheet .panelcta{display:none} }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<!-- ── Art library (reusable framed prints) ── -->
<svg class="defs" aria-hidden="true">
  <defs>
    <linearGradient id="gDune" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9cfa6"/><stop offset="1" stop-color="#d8a877"/>
    </linearGradient>
  </defs>

  <!-- A · Warm arch / sun -->
  <symbol id="artA" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
    <rect width="400" height="500" fill="#ecdfcb"/>
    <circle cx="200" cy="205" r="150" fill="#c8794f"/>
    <path d="M120 205a80 80 0 0 1 160 0v150H120z" fill="#e7c07a"/>
    <line x1="70" y1="410" x2="330" y2="410" stroke="#3a2b20" stroke-width="4"/>
  </symbol>
  <!-- B · Sage botanical line -->
  <symbol id="artB" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
    <rect width="400" height="500" fill="#eaeee5"/>
    <path d="M200 480C185 400 220 350 200 270C182 200 214 150 200 60" fill="none" stroke="#7e977f" stroke-width="5" stroke-linecap="round"/>
    <path d="M200 150c-40-30-78-20-96-42" fill="none" stroke="#7e977f" stroke-width="4"/>
    <ellipse cx="150" cy="230" rx="42" ry="16" fill="#8fa88f" transform="rotate(-32 150 230)"/>
    <ellipse cx="252" cy="300" rx="46" ry="17" fill="#9db69d" transform="rotate(28 252 300)"/>
    <ellipse cx="150" cy="360" rx="40" ry="15" fill="#8fa88f" transform="rotate(-30 150 360)"/>
  </symbol>
  <!-- C · Organic Matisse shapes -->
  <symbol id="artC" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
    <rect width="400" height="500" fill="#efe7d7"/>
    <path d="M150 90c70-30 150 10 120 90-25 66-120 40-150-10-24-40-20-58 30-80z" fill="#b7a7e0"/>
    <path d="M120 300c60-40 170-20 150 60-14 56-120 78-176 30-40-34-16-70 26-90z" fill="#cf9f86"/>
    <path d="M250 250c40 6 60 40 44 70" fill="none" stroke="#3a2b20" stroke-width="5" stroke-linecap="round"/>
  </symbol>
  <!-- D · Dunes duotone -->
  <symbol id="artD" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
    <rect width="400" height="500" fill="url(#gDune)"/>
    <circle cx="290" cy="130" r="46" fill="#f2e2c2"/>
    <path d="M0 320c90-50 150 20 220-10s120-40 180-10v210H0z" fill="#c98a5c"/>
    <path d="M0 400c110-40 180 30 260 0s90-20 140-6v116H0z" fill="#a9673f"/>
  </symbol>
  <!-- E · Bauhaus geometric -->
  <symbol id="artE" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
    <rect width="400" height="500" fill="#e8e0d0"/>
    <path d="M200 90a110 110 0 0 1 0 220z" fill="#cf9f6a"/>
    <path d="M200 90a110 110 0 0 0 0 220z" fill="#9aa7b8"/>
    <rect x="70" y="330" width="120" height="120" fill="#c07d64"/>
    <circle cx="300" cy="390" r="60" fill="none" stroke="#3a2b20" stroke-width="6"/>
  </symbol>
  <!-- F · Ink line figure -->
  <symbol id="artF" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
    <rect width="400" height="500" fill="#eee7d9"/>
    <path d="M150 70c-60 34-58 150-6 190-46 40-38 150 60 160 84 8 120-70 96-140 60-30 44-150-30-180-40-16-84-6-120-30z" fill="none" stroke="#1a1917" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="176" cy="200" r="9" fill="#1a1917"/>
    <path d="M150 300c40 30 90 26 120-6" fill="none" stroke="#c8794f" stroke-width="6" stroke-linecap="round"/>
  </symbol>
</svg>

<div class="app">

  <div class="top">
    <button class="icon" aria-label="Wstecz"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="brand">Zbuduj swoją ścianę</div>
    <button class="cart"><svg viewBox="0 0 24 24"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg>486 zł</button>
  </div>

  <!-- mobile step progress -->
  <div class="mprog">
    <span class="lab">Krok 3 z 5 <span>· Grafiki</span></span>
    <span class="segs"><i class="done"></i><i class="done"></i><i class="on"></i><i></i><i></i></span>
  </div>

  <div class="strip">
